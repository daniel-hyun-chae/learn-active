name: CI Validation

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Validate lockfile and pnpm major alignment
        run: pnpm validate:lockfile

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate committed env template file
        shell: bash
        run: |
          set -euo pipefail
          test -f .env.example

      - name: Install Playwright browser dependencies
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint monorepo
        run: pnpm lint

      - name: Verify React Native participates in CI checks
        run: pnpm --filter @app/learners-mobile lint

      - name: Build monorepo
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        run: pnpm test:integration

      - name: Run e2e tests
        run: pnpm test:e2e
