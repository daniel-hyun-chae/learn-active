name: Deploy Staging

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      api_changed: ${{ steps.detect.outputs.api_changed }}
      web_changed: ${{ steps.detect.outputs.web_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed deployable areas
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ "$before" == "0000000000000000000000000000000000000000" ]]; then
            mapfile -t files < <(git ls-tree -r --name-only "$after")
          else
            mapfile -t files < <(git diff --name-only "$before" "$after")
          fi

          api_changed=false
          web_changed=false

          for file in "${files[@]}"; do
            [[ -z "$file" ]] && continue
            case "$file" in
              apps/api/*|supabase/*)
                api_changed=true
                ;;
              apps/web/*)
                web_changed=true
                ;;
              shared/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json|tsconfig.base.json)
                api_changed=true
                web_changed=true
                ;;
              apps/learners-mobile/*)
                ;;
              *)
                ;;
            esac
          done

          echo "api_changed=$api_changed" >> "$GITHUB_OUTPUT"
          echo "web_changed=$web_changed" >> "$GITHUB_OUTPUT"

  deploy-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api_changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate staging deployment environment contract
        env:
          SUPABASE_PROJECT_URL_STAGING: ${{ secrets.SUPABASE_PROJECT_URL_STAGING }}
          SUPABASE_PUBLISHABLE_KEY_STAGING: ${{ secrets.SUPABASE_PUBLISHABLE_KEY_STAGING }}
          API_URL_STAGING: ${{ secrets.API_URL_STAGING }}
          WEB_URL_STAGING: ${{ secrets.WEB_URL_STAGING }}
          STRIPE_SECRET_KEY_STAGING: ${{ secrets.STRIPE_SECRET_KEY_STAGING }}
          STRIPE_PUBLISHABLE_KEY_STAGING: ${{ secrets.STRIPE_PUBLISHABLE_KEY_STAGING }}
          STRIPE_WEBHOOK_SECRET_STAGING: ${{ secrets.STRIPE_WEBHOOK_SECRET_STAGING }}
        run: pnpm validate:deploy-env -- --target staging

      - name: Sync Stripe Worker secrets to staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STRIPE_SECRET_KEY_STAGING: ${{ secrets.STRIPE_SECRET_KEY_STAGING }}
          STRIPE_WEBHOOK_SECRET_STAGING: ${{ secrets.STRIPE_WEBHOOK_SECRET_STAGING }}
        run: |
          printf '%s' "$STRIPE_SECRET_KEY_STAGING" | pnpm --filter @app/api exec wrangler secret put STRIPE_SECRET_KEY --name course-api-staging
          printf '%s' "$STRIPE_WEBHOOK_SECRET_STAGING" | pnpm --filter @app/api exec wrangler secret put STRIPE_WEBHOOK_SECRET --name course-api-staging

      - name: Deploy API Worker to staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_PROJECT_URL_STAGING }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY_STAGING }}
        run: pnpm --filter @app/api deploy:worker:staging -- --var "SUPABASE_URL:${SUPABASE_URL}" --var "STRIPE_PUBLISHABLE_KEY:${STRIPE_PUBLISHABLE_KEY}"

      - name: Verify staging API health after deploy
        env:
          API_URL_STAGING: ${{ secrets.API_URL_STAGING }}
        run: node scripts/verify-hosted-api-health.mjs --url "$API_URL_STAGING" --env staging

  deploy-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.web_changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate staging deployment environment contract
        env:
          SUPABASE_PROJECT_URL_STAGING: ${{ secrets.SUPABASE_PROJECT_URL_STAGING }}
          SUPABASE_PUBLISHABLE_KEY_STAGING: ${{ secrets.SUPABASE_PUBLISHABLE_KEY_STAGING }}
          API_URL_STAGING: ${{ secrets.API_URL_STAGING }}
          WEB_URL_STAGING: ${{ secrets.WEB_URL_STAGING }}
          STRIPE_SECRET_KEY_STAGING: ${{ secrets.STRIPE_SECRET_KEY_STAGING }}
          STRIPE_PUBLISHABLE_KEY_STAGING: ${{ secrets.STRIPE_PUBLISHABLE_KEY_STAGING }}
          STRIPE_WEBHOOK_SECRET_STAGING: ${{ secrets.STRIPE_WEBHOOK_SECRET_STAGING }}
        run: pnpm validate:deploy-env -- --target staging

      - name: Build web for staging
        env:
          APP_ENV: staging
          VITE_APP_ENV: staging
          VITE_GRAPHQL_ENDPOINT: ${{ secrets.API_URL_STAGING }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_PROJECT_URL_STAGING }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY_STAGING }}
        run: pnpm --filter @app/web build

      - name: Verify built web GraphQL endpoint for staging
        env:
          EXPECTED_GRAPHQL_ENDPOINT: ${{ secrets.API_URL_STAGING }}
        run: node scripts/verify-web-build-endpoint.mjs --dist apps/web/dist --expected "$EXPECTED_GRAPHQL_ENDPOINT" --env staging

      - name: Deploy web to staging Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @app/web deploy:pages:staging
