services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-learn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learn}
      POSTGRES_DB: ${POSTGRES_DB:-learn}
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://learn:learn@postgres:5432/learn}
      PORT: 4000
    depends_on:
      - postgres
    ports:
      - '4000:4000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4000/graphql',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({query:'{ health }'})}).then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_GRAPHQL_ENDPOINT: ${VITE_GRAPHQL_ENDPOINT:-http://localhost:4000/graphql}
        GRAPHQL_ENDPOINT: ${GRAPHQL_ENDPOINT:-http://api:4000/graphql}
    environment:
      GRAPHQL_ENDPOINT: ${GRAPHQL_ENDPOINT:-http://api:4000/graphql}
      PORT: 4100
    depends_on:
      - api
    ports:
      - '4100:4100'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4100/learn',{method:'GET'}).then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
