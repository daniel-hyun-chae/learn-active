services:
  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    user: node
    command: sh -lc "mkdir -p /workspaces/learn-active/node_modules; if [ \"$(id -u)\" = \"0\" ]; then chown -R node:node /workspaces/learn-active/node_modules; elif command -v sudo >/dev/null 2>&1; then sudo chown -R node:node /workspaces/learn-active/node_modules; else echo '[devcontainer] Unable to chown node_modules (non-root, no sudo).'; fi; sleep infinity"
    volumes:
      - .:/workspaces/learn-active:cached
      - dev_node_modules:/workspaces/learn-active/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:15422/postgres
      GRAPHQL_ENDPOINT: ${GRAPHQL_ENDPOINT:-http://localhost:4000/graphql}
      VITE_GRAPHQL_ENDPOINT: ${VITE_GRAPHQL_ENDPOINT:-http://localhost:4000/graphql}
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    ports:
      - '4000:4000'
      - '4100:4100'
    shm_size: '1gb'

volumes:
  dev_node_modules:
